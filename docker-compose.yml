# ============================================
# DOCKER COMPOSE
# Orchestrates multiple containers together
# Service 1: backend (FastAPI app)
# Service 2: db (PostgreSQL database)
# ============================================

version: '3.8'

services:
  # ============================================
  # BACKEND SERVICE
  # Builds from our Dockerfile in backend/
  # ============================================
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password@db:5432/finsight_db
      - SECRET_KEY=supersecretkey123
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    depends_on:
      - db
    volumes:
      - ./ml:/app/ml
      - ./data:/app/data

  # ============================================
  # DATABASE SERVICE
  # Official PostgreSQL image
  # ============================================
  db:
    image: postgres:15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=finsight_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: